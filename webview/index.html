<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src {{cspSource}}; img-src {{cspSource}} data: blob:; font-src {{cspSource}};" />
  <title>Grok Build</title>
  <link rel="stylesheet" href="{{styleUri}}" />
  <style>
    /* Injected host font size — matches VS Code editor.fontSize (default 14) */
    :root {
      --fs-base: {{fontSize}}px;
      --fs-msg: {{fontSize}}px;
      --fs-input: {{fontSize}}px;
      --fs-sm: calc({{fontSize}}px - 1px);
      --fs-xs: calc({{fontSize}}px - 2px);
      --fs-code: calc({{fontSize}}px - 0.5px);
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand" title="Grok Build">
        <img class="brand-logo" id="brandLogo" src="{{logoUri}}" alt="Grok" width="18" height="18" />
        <span class="brand-name">Grok</span>
      </div>
      <div class="session-tabs" id="sessionTabs"></div>
      <div class="topbar-actions">
        <button type="button" class="icon-btn" id="btnNew" title="New session">+</button>
        <button type="button" class="icon-btn" id="btnHistory" title="Resume session">⏱</button>
        <button type="button" class="mode-btn" id="btnMode" title="Toggle plan/execute mode">Execute</button>
      </div>
    </header>

    <div class="cli-banner hidden" id="cliBanner">
      <div class="cli-banner-text">
        <strong>Grok CLI required</strong>
        <span id="cliBannerDetail">This extension uses the official CLI via ACP (<code>grok agent stdio</code>).</span>
      </div>
      <button type="button" class="text-btn primary-btn" id="btnSetupCli">Setup CLI…</button>
    </div>

    <div class="status-bar" id="statusBar">
      <span id="statusText">Ready</span>
      <span class="status-actions">
        <button type="button" class="status-chip" id="chipModel" title="Change model">Model: —</button>
        <button type="button" class="status-chip" id="chipPerm" title="Change permission mode">Perm: Ask</button>
      </span>
      <span id="usageText" class="usage"></span>
    </div>

    <div class="plan-panel hidden" id="planPanel">
      <div class="plan-title">Plan</div>
      <ul id="planList"></ul>
    </div>

    <main class="messages" id="messages"></main>

    <div class="context-chips" id="contextChips"></div>

    <footer class="composer">
      <div class="composer-toolbar">
        <button type="button" class="text-btn" id="btnContext" title="Add context (Alt+G)">@ Context</button>
        <button type="button" class="text-btn" id="btnSlash" title="Slash commands">/ Commands</button>
        <button type="button" class="text-btn" id="btnImage" title="Attach image">🖼 Image</button>
        <button type="button" class="text-btn" id="btnModel" title="Select model">Model</button>
        <button type="button" class="text-btn" id="btnPerm" title="Permission mode">Perm</button>
        <input type="file" id="imageInput" accept="image/*" multiple hidden />
      </div>
      <div class="composer-wrap">
        <div class="slash-menu hidden" id="slashMenu" role="listbox" aria-label="Slash commands"></div>
        <div class="composer-row">
          <textarea id="input" rows="2" placeholder="Message Grok Build… (/ commands, @ context, Enter to send)"></textarea>
          <div class="composer-actions">
            <button type="button" class="send-btn" id="btnSend" title="Send">↑</button>
            <button type="button" class="stop-btn hidden" id="btnStop" title="Cancel">■</button>
          </div>
        </div>
      </div>
      <div class="pending-edits hidden" id="pendingEdits"></div>
    </footer>
  </div>
  <script src="{{scriptUri}}"></script>
</body>
</html>
